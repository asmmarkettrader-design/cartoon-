name: Automatic Procedural Cartoon Generator

on:
  workflow_dispatch: # Allows you to trigger the workflow manually from GitHub Actions tab

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 320 # Absolute limit before GitHub cancels the job completely

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies, FFmpeg & Audio Libs
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg blender libsndfile1 espeak-ng

    - name: Install Python Requirements & SDKs
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Main Control Pipeline (With Live Blender Logging)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Upload Output Directory to Artifacts
      if: always() # Forces download folder creation even if Blender crashed or partially rendered
      uses: actions/upload-artifact@v4
      with:
        name: Final-Cartoon-Output
        path: output/
