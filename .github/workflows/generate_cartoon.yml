name: Automatic Procedural Cartoon Generator

on:
  workflow_dispatch:

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 320

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies & FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg blender

    - name: Install Python Requirements & SDKs
      run: |
        pip install --upgrade pip
        pip install google-generativeai google-genai

    - name: Run Main Control Pipeline (With Live Blender Logging)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Upload Output Directory to Artifacts
      if: always() # This forces folder generation and file upload even if things crashed partially
      uses: actions/upload-artifact@v4
      with:
        name: Final-Cartoon-Output
        path: output/
